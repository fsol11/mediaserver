# ============================================================
# Recyclarr Configuration
# Syncs quality profiles and custom formats to Radarr/Sonarr
# Docs: https://recyclarr.dev/wiki/yaml/config-reference/
#
# IMPORTANT: Fill in API keys in /media/john/DATA/mediaserver/.env
# API keys are injected via environment variables SONARR_API_KEY
# and RADARR_API_KEY set in docker-compose.yml
# ============================================================

sonarr:
  sonarr-main:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY

    # Quality definition to sync
    quality_definition:
      type: series

    # Include TRaSH Guide recommended profiles
    include:
      - template: sonarr-quality-definition-series
      - template: sonarr-v4-standard-web-1080p

radarr:
  radarr-main:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY

    # Quality definition to sync
    quality_definition:
      type: movie

    # Include TRaSH Guide recommended profiles
    include:
      - template: radarr-quality-definition-movie
      - template: radarr-movie-web-dl-1080p
