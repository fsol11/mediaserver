---
# Homepage Services
# API keys use {{HOMEPAGE_VAR_*}} syntax - injected from docker-compose env
# hrefs use CF subdomains so links work from any remote browser

- Media:
    - Jellyfin:
        href: https://jellyfin.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: Media Server
        icon: jellyfin.png
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          enableBlocks: true
          enableNowPlaying: true
          expandOneStreamToTwoRows: false

    - Jellyseerr:
        href: https://requests.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: Media Requests
        icon: jellyseerr.png
        widget:
          type: jellyseerr
          url: http://jellyseerr:5055
          key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"

    - Audiobookshelf:
        href: https://books.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: Audiobooks & Podcasts
        icon: audiobookshelf.png
        widget:
          type: audiobookshelf
          url: http://audiobookshelf:80
          key: "{{HOMEPAGE_VAR_AUDIOBOOKSHELF_KEY}}"

- Downloads:
    - qBittorrent:
        href: https://qbit.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: Torrent Client
        icon: qbittorrent.png
        widget:
          type: qbittorrent
          url: http://qbittorrent:8080
          username: "{{HOMEPAGE_VAR_QBIT_USERNAME}}"
          password: "{{HOMEPAGE_VAR_QBIT_PASSWORD}}"

    - Prowlarr:
        href: https://prowlarr.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: Indexer Manager
        icon: prowlarr.png
        widget:
          type: prowlarr
          url: http://prowlarr:9696
          key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"

    - Unpackerr:
        href: https://qbit.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: Archive Extractor
        icon: unpackerr.png

- Management:
    - Radarr:
        href: https://radarr.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: Movie Manager
        icon: radarr.png
        widget:
          type: radarr
          url: http://radarr:7878
          key: "{{HOMEPAGE_VAR_RADARR_KEY}}"

    - Sonarr:
        href: https://sonarr.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: TV Series Manager
        icon: sonarr.png
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: "{{HOMEPAGE_VAR_SONARR_KEY}}"

    - Bazarr:
        href: https://bazarr.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: Subtitle Manager
        icon: bazarr.png
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: "{{HOMEPAGE_VAR_BAZARR_KEY}}"

- Monitoring:
    - Uptime Kuma:
        href: https://status.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: Service Monitor
        icon: uptime-kuma.png
        widget:
          type: uptimekuma
          url: http://uptime-kuma:3001
          slug: mediaserver

    - Homepage:
        href: https://homepage.{{HOMEPAGE_VAR_CF_DOMAIN}}
        description: This Dashboard
        icon: homepage.png
